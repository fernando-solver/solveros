name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile all pmo_*.py modules
        run: |
          for f in pmo_*.py pmo_hooks/*.py; do
            echo "Compiling $f..."
            python -m py_compile "$f"
          done

      - name: Smoke test pmo_db init
        run: |
          python -c "from pmo_db import init_db; init_db(); print('[OK] pmo.db schema initialized')"

      - name: Smoke test session_start hook
        run: |
          python pmo_hooks/session_start.py

      - name: List stacks
        run: |
          python pmo_stacks.py list

  markdown-links:
    name: Check markdown links
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check links in README.md
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          file-path: './README.md, ./README.pt-BR.md'
          config-file: '.github/markdown-link-check-config.json'
        continue-on-error: true
